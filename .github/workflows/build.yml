name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk
          pip install buildozer cython
      - name: First build to download SDK
        run: buildozer android debug || true
      - name: Force accept SDK licenses
        run: |
          SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          $SDK_ROOT/tools/bin/sdkmanager --sdk_root=$SDK_ROOT --update > /dev/null 2>&1 || true
          yes | $SDK_ROOT/tools/bin/sdkmanager --sdk_root=$SDK_ROOT --licenses > /dev/null 2>&1 || true
      - name: Build APK
        run: buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: susi-apk
          path: bin/*.apk
