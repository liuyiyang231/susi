name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk
          pip install buildozer cython
      - name: Force Patch Buildozer Source Code
        run: |
          TARGET_FILE=$(python -c "import buildozer.targets.android as m; print(m.__file__)")
          echo "Patching file: $TARGET_FILE"
          sudo sed -i "s/'build-tools;37.0.0'/'build-tools;34.0.0'/g" "$TARGET_FILE"
          echo "Patched content:"
          grep "build-tools" "$TARGET_FILE"
      - name: Accept Licenses
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
      - name: Build APK
        run: buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: susi-apk
          path: bin/*.apk
